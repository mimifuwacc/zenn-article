commit-msg:
  skip: merge
  commands:
    commitlint:
      run: bun commitlint --edit {1}

pre-commit:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,cts,mts,jsx,tsx,json,jsonc,md,mdx}"
      run: >
        bun biome check
        --write
        --no-errors-on-unmatched
        --files-ignore-unknown=true
        {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,cts,mts,jsx,tsx,json,jsonc,md,mdx}"
      run: >
        bun biome check
        --no-errors-on-unmatched
        --files-ignore-unknown=true
        {push_files}
